name: Update Market Data

on:
  schedule:
    # Run daily at 6:00 AM UTC (1:00 AM EST, after US markets close + settlement)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update SPX data
        run: node scripts/update-spx.mjs

      - name: Update NDX data
        run: node scripts/update-ndx.mjs

      - name: Update Fed Funds Rate data
        run: node scripts/update-fedfunds.mjs

      - name: Update CPI data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/update-cpi.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git commit -m "chore: auto-update market data $(date -u +%Y-%m-%d)"
          git push
